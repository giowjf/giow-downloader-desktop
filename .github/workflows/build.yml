name: Build Multi-Platform

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: win
            artifact_glob: "dist/GIOW-Downloader-*-win.exe"
          - os: macos-latest
            target: mac
            artifact_glob: "dist/GIOW-Downloader-*-mac.dmg"
          - os: ubuntu-latest
            target: linux
            artifact_glob: "dist/GIOW-Downloader-*-linux.AppImage"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── Instalar ffmpeg por plataforma ─────────────────────────────────────
      - name: Instalar ffmpeg (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install ffmpeg -y

      - name: Instalar ffmpeg (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install ffmpeg

      - name: Instalar ffmpeg (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # ── Dependências Python ────────────────────────────────────────────────
      - name: Instalar dependências Python
        run: pip install "yt-dlp[default]" flask flask-cors pyinstaller

      # ── PyInstaller ────────────────────────────────────────────────────────
      - name: Build PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ytdlp = (Get-Command yt-dlp).Source
          $ffmpeg = (Get-Command ffmpeg).Source
          python -m PyInstaller `
            --onedir `
            --name server `
            --distpath python-dist `
            --workpath build/pyinstaller `
            --specpath build `
            --noconsole `
            --clean `
            "--add-binary=$ytdlp;." `
            "--add-binary=$ffmpeg;." `
            python/server.py

      - name: Build PyInstaller (macOS/Linux)
        if: matrix.os != 'windows-latest'
        run: |
          YTDLP=$(which yt-dlp)
          FFMPEG=$(which ffmpeg)
          python -m PyInstaller \
            --onedir \
            --name server \
            --distpath python-dist \
            --workpath build/pyinstaller \
            --specpath build \
            --clean \
            "--add-binary=$YTDLP:." \
            "--add-binary=$FFMPEG:." \
            python/server.py
          chmod 755 python-dist/server/server

      # ── Copia server/ para onde o electron-builder espera ─────────────────
      - name: Copiar server (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Copy-Item -Recurse -Force python-dist/server server
          if (Test-Path "server/server.exe") {
            Write-Host "✓ server/server.exe encontrado"
          } else {
            Write-Host "ERRO: server/server.exe não encontrado"; exit 1
          }

      - name: Copiar server (macOS/Linux)
        if: matrix.os != 'windows-latest'
        run: |
          cp -r python-dist/server server
          chmod 755 server/server
          if [ -f "server/server" ]; then
            echo "✓ server/server encontrado"
          else
            echo "ERRO: server/server não encontrado"; exit 1
          fi

      # ── Build Electron ─────────────────────────────────────────────────────
      - name: npm install
        run: npm install

      - name: Build Electron (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run build:win

      - name: Build Electron (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build Electron (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run build:linux

      # ── Upload ─────────────────────────────────────────────────────────────
      - name: Upload artefato
        uses: actions/upload-artifact@v4
        with:
          name: GIOW-Downloader-${{ matrix.target }}
          path: ${{ matrix.artifact_glob }}
          retention-days: 30

      - name: Release (se for tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.artifact_glob }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
