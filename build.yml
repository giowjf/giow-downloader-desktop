name: Build Windows EXE

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar ffmpeg
        run: choco install ffmpeg -y

      - name: Instalar dependências Python
        run: pip install "yt-dlp[default]" flask flask-cors pyinstaller

      - name: Instalar dependências Node
        run: npm install

      - name: Build — PyInstaller (servidor Python)
        run: |
          $ytdlp = (Get-Command yt-dlp).Source
          $ffmpeg = (Get-Command ffmpeg).Source
          python -m PyInstaller `
            --onedir `
            --name server `
            --distpath python-dist `
            --workpath build/pyinstaller `
            --specpath build `
            --noconsole `
            --clean `
            "--add-binary=$ytdlp;." `
            "--add-binary=$ffmpeg;." `
            python/server.py

      - name: Build — Electron (executável portátil)
        run: npm run build

      - name: Upload artefato
        uses: actions/upload-artifact@v4
        with:
          name: GIOW-Downloader-Windows
          path: dist/GIOW-Downloader-*.exe
          retention-days: 30

      - name: Release (se for tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/GIOW-Downloader-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
